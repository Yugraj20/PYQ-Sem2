<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Viewer – By Yugraj</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060f;
            --surface: #0d0e1d;
            --surface2: #131426;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(99,102,241,0.5);
            --accent: #6366f1;
            --accent2: #818cf8;
            --accent-green: #34d399;
            --text-1: #f1f5f9;
            --text-2: #94a3b8;
            --text-3: #475569;
            --r: 20px;
            --r-sm: 14px;
            --glow: 0 0 50px rgba(99,102,241,0.18);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; font-size: 19px; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(99,102,241,0.13) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(52,211,153,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
            height: 80px;
            background: rgba(5,6,15,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.35rem;
            box-shadow: 0 0 24px rgba(99,102,241,0.45);
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.35rem;
            color: var(--text-1);
        }

        .badge {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-2);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 0.35rem 1rem;
            border-radius: 99px;
            letter-spacing: 0.03em;
            /* CRITICAL FIXES FOR OVAL BUG */
            white-space: nowrap; 
            flex-shrink: 0;
        }

        /* ── Breadcrumb (Now Sticky) ── */
        #breadcrumb {
            position: sticky;
            z-index: 190;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 3rem;
            font-size: 0.85rem;
            color: var(--text-3);
            min-height: 2.8rem;
            background: rgba(5,6,15,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .crumb { cursor: pointer; transition: color 0.2s; }
        .crumb:hover { color: var(--accent2); }
        .crumb-sep { color: var(--text-3); user-select: none; }
        .crumb.active { color: var(--text-2); cursor: default; }

        /* ── Main content ── */
        #content {
            flex: 1;
            position: relative;
            z-index: 1;
            padding: 1.5rem 3rem 4rem; /* Reduced top padding to accommodate sticky header */
        }

        /* ── View layers ── */
        .view-layer {
            display: none;
            flex-direction: column;
            animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .view-layer.active { display: flex; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Section headings ── */
        .section-heading { margin-bottom: 0.4rem; }

        .section-heading h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-1);
        }

        .section-heading p {
            margin-top: 0.5rem;
            font-size: 1rem;
            color: var(--text-2);
            font-weight: 300;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin: 1.75rem 0;
        }

        /* ── Category cards ── */
        .cat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 800px;
        }

        .cat-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 2.5rem 2rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .cat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(99,102,241,0.13), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cat-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--glow);
            transform: translateY(-4px);
        }

        .cat-card:hover::before { opacity: 1; }

        .cat-icon {
            font-size: 2.2rem;
            width: 62px; height: 62px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.25s, border-color 0.25s;
        }

        .cat-card:hover .cat-icon {
            background: rgba(99,102,241,0.13);
            border-color: rgba(99,102,241,0.3);
        }

        .cat-label {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .cat-meta { font-size: 0.85rem; color: var(--text-3); }

        .cat-arrow {
            position: absolute;
            right: 1.75rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            transition: color 0.25s, right 0.25s;
            font-size: 1.2rem;
        }

        .cat-card:hover .cat-arrow { color: var(--accent2); right: 1.4rem; }

        /* ── Subject grid ── */
        .sub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 1.25rem;
            max-width: 1000px;
        }

        .sub-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 2rem 1.25rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .sub-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .sub-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--glow);
            transform: translateY(-5px);
        }

        .sub-card:hover::after { transform: scaleX(1); }

        .sub-icon {
            font-size: 2.2rem;
            width: 60px; height: 60px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.25s;
        }

        .sub-card:hover .sub-icon { background: rgba(99,102,241,0.13); }

        .sub-label {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        /* ── List view & Sticky Items ── */
        .list-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;

            /* Sticky Setup */
            position: sticky;
            z-index: 180;
            background: rgba(5,6,15,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            
            /* Counter content padding to allow background to stretch */
            margin-left: -3rem;
            margin-right: -3rem;
            padding: 1rem 3rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .list-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-width: 860px;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);

            /* Sticky Setup */
            position: sticky;
            z-index: 170;
            background: rgba(5,6,15,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            
            /* Counter content padding */
            margin-left: -3rem;
            margin-right: -3rem;
            padding: 1.25rem 3rem 0.6rem;
        }

        .group-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* File rows */
        .file-row {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            padding: 1.1rem 1.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }

        .file-row:hover {
            border-color: var(--border-hover);
            background: var(--surface2);
            transform: translateX(5px);
        }

        .file-row-icon {
            width: 42px; height: 42px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .file-row:hover .file-row-icon { background: rgba(99,102,241,0.15); }

        .file-row-name {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text-1);
        }

        .file-row-chip {
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.25rem 0.7rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            color: var(--text-3);
            background: var(--surface2);
            flex-shrink: 0;
        }

        .file-row-arrow {
            color: var(--text-3);
            font-size: 0.9rem;
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .file-row:hover .file-row-arrow { color: var(--accent2); transform: translateX(3px); }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.1rem;
            padding: 5rem 2rem;
            text-align: center;
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: var(--r);
            width: 100%;
            max-width: 860px;
            align-self: center;
        }

        .empty-state .big-icon { font-size: 4rem; }

        .empty-state p {
            font-size: 1.4rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--text-2);
        }

        .empty-state span {
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-3);
        }

        /* ── PYQ number badge ── */
        .pyq-num {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: rgba(99,102,241,0.13);
            color: var(--accent2);
            font-size: 0.8rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.3rem;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-2);
            background: var(--surface);
            border: 1px solid var(--border);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text-1);
            background: var(--surface2);
        }

        .btn-green {
            background: rgba(52,211,153,0.1);
            border-color: rgba(52,211,153,0.3);
            color: var(--accent-green);
        }

        .btn-green:hover {
            background: rgba(52,211,153,0.18);
            border-color: rgba(52,211,153,0.5);
            color: var(--accent-green);
        }

        /* ── Iframe view ── */
        #iframeContainer { gap: 1rem; }

        iframe {
            flex: 1;
            width: 100%;
            min-height: calc(100vh - 180px);
            border: none;
            border-radius: var(--r);
            background: #fff;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            html { font-size: 16px; }
            header { padding: 0 1.5rem; height: 68px; }
            
            #breadcrumb { padding: 0.8rem 1.5rem; }
            #content { padding: 1.25rem 1.5rem 3rem; }
            
            /* Responsive adjustments for negative margins on sticky items */
            .list-toolbar {
                margin-left: -1.5rem;
                margin-right: -1.5rem;
                padding: 1rem 1.5rem;
            }
            .group-header {
                margin-left: -1.5rem;
                margin-right: -1.5rem;
                padding: 1.25rem 1.5rem 0.6rem;
            }

            .cat-grid { grid-template-columns: 1fr; }
            .sub-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .section-heading h2 { font-size: 1.8rem; }
        }

        /* Further fix for very small mobile screens to save badge */
        @media (max-width: 480px) {
            .badge {
                font-size: 0.65rem;
                padding: 0.25rem 0.6rem;
            }
            .logo-text { font-size: 1.1rem; }
            .logo-icon { width: 36px; height: 36px; font-size: 1.1rem; }
        }
        @media (max-width: 360px) {
            .badge { display: none; } /* Complete fallback for super narrow screens */
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">🎓</div>
        <span class="logo-text">StudyViewer</span>
    </div>
    <div class="badge">Made with ❤️ by Yugraj</div>
</header>

<div id="breadcrumb"></div>

<div id="content">

    <div id="categoryDrawer" class="view-layer active">
        <div class="section-heading">
            <h2>Where do you want to start?</h2>
            <p>Pick a resource type to begin browsing.</p>
        </div>
        <div class="divider"></div>
        <div class="cat-grid" id="categoryGrid"></div>
    </div>

    <div id="subjectDrawer" class="view-layer">
        <div class="section-heading">
            <h2 id="subjectViewTitle">Subjects</h2>
            <p>Choose a subject to view its materials.</p>
        </div>
        <div class="divider"></div>
        <div class="sub-grid" id="subjectGrid"></div>
    </div>

    <div id="listDrawer" class="view-layer">
        <div class="list-toolbar">
            <div class="section-heading" style="margin-bottom:0;">
                <h2 id="listTitle">Materials</h2>
            </div>
            <button id="topSyllabusBtn" class="btn btn-green" style="display:none;">📑 View Syllabus</button>
        </div>
        <div class="list-grid" id="listGrid"></div>
    </div>

    <div id="iframeContainer" class="view-layer">
        <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem;">
            <span id="iframeTitle" style="font-family:'Syne',sans-serif;font-weight:600;font-size:1.1rem;color:var(--text-1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
        </div>
        <iframe id="pdfFrame" allowfullscreen></iframe>
    </div>

</div>

<script>
    const categories = {
        'pyqs':  { title: 'Previous Year Questions', icon: '📝', desc: 'Past exam papers for practice & revision' },
        'notes': { title: 'Subject Notes',           icon: '📚', desc: 'Detailed notes organized by unit' }
    };

    const subjects = {
        'maths': { title: 'Applied Maths',         icon: '📈', syllabus: 'AM Syllabus.pdf' },
        'dsa':   { title: 'DSA',                   icon: '🔗', syllabus: 'DSA Syllabus.pdf' },
        'dbms':  { title: 'DBMS',                  icon: '🗄️', syllabus: 'DBMS Syllabus.pdf' },
        'web':   { title: 'WBP',                   icon: '🌐', syllabus: 'WBP Syllabus.pdf' },
        'evs':   { title: 'Environmental Studies', icon: '🌿', syllabus: 'EVS Syllabus.pdf' }
    };

    const contentData = {
        'pyqs': {
            'maths': ['AppliedMaths_PYQ1.pdf','AppliedMaths_PYQ2.pdf','AppliedMaths_PYQ3.pdf'],
            'dsa':   ['DSA_PYQ1.pdf','DSA_PYQ2.pdf','DSA_PYQ3.pdf'],
            'dbms':  ['DBMS_PYQ1.pdf','DBMS_PYQ2.pdf','DBMS_PYQ3.pdf','DBMS_PYQ4.pdf'],
            'web':   ['WBP_PYQ1.pdf','WBP_PYQ2.pdf','WBP_PYQ3.pdf'],
            'evs':   ['EVS_PYQ1.pdf','EVS_PYQ2.pdf','EVS_PYQ3.pdf']
        },
        'notes': {
            'maths': [],
            'dsa': [
                { type:'header', title:'Unit 1' },
                { file:'DSA UNIT-1.pdf', name:'Introduction to DSA' },
                { type:'header', title:'Unit 2' },
                { file:'DSA UNIT-2(DMA).pdf', name:'Dynamic Memory Allocation (DMA)' },
                { file:'UNIT-2 (LINKED LISTS).pdf', name:'Linked Lists' },
                { file:'UNIT 2- stack & Queue.pdf', name:'Stack & Queue' },
                { file:'Unit-2 Hashing and Collision Resolution.pdf', name:'Hashing & Collision Resolution' },
                { type:'header', title:'Unit 4' },
                { file:'UNIT 4-graph.pdf', name:'Graphs' }
            ],
            'dbms': [
                { type:'header', title:'Unit 1 — Introduction & ER Modeling' },
                { file:'DBMS Class.pdf', name:'DBMS' },
                { file:'Data Model.pdf', name:'Data Model' },
                { file:'ER Diagram.pdf', name:'ER Diagram' },
                { file:'Keys in DBMS.pdf', name:'Keys in DBMS' },
                { file:'DBMS Generalization.pdf', name:'DBMS Generalization' },
                { type:'header', title:'Unit 2 — SQL' },
                { file:'UNIT-2.pdf', name:'Unit-2 Notes' },
                { type:'header', title:'Unit 3 — Relational Model & Normalization' },
                { file:'UNIT-3.pdf', name:'Unit-3 Notes' },
                { file:'UNIT 3b Relational Algebra.pdf', name:'Relational Algebra' },
                { file:'UNIT-3 c ER to relational mapping.pdf', name:'ER to Relational Mapping' },
                { type:'header', title:'Projects & Case Studies' },
                { file:'projectcasestudy.pdf', name:'Project Case Study' }
            ],
            'web': [
                { type:'header', title:'Unit 1 — Introduction, Control Statements & Arrays' },
                { file:'1.pdf', name:'Introduction to PHP' },
                { file:'2.pdf', name:'PHP Basics & Setup' },
                { file:'12 magical constant.pdf', name:'Magical Constants' },
                { file:'11 Regular Expression.pdf', name:'Regular Expressions' },
                { file:'3 conditonal statemens.pdf', name:'Conditional Statements' },
                { file:'4 for loop.pdf', name:'For Loop' },
                { file:'5 while do while.pdf', name:'While & Do-While Loop' },
                { file:'8 array.pdf', name:'Arrays' },
                { file:'9 sorted array.pdf', name:'Sorted Arrays' },
                { file:'10 array function.pdf', name:'Array Functions' },
                { type:'header', title:'Unit 2 — Functions, Forms & State Management' },
                { file:'13 function.pdf', name:'Functions' },
                { file:'14 inbuilt function.pdf', name:'Inbuilt Functions' },
                { file:'15 Types of Errors in PHP.pdf', name:'Types of Errors in PHP' },
                { file:'6 form.pdf', name:'Forms Basics' },
                { file:'7 form.pdf', name:'Forms Handling' },
                { file:'14 Cookie & Session.pdf', name:'Cookies & Sessions' },
                { file:'16 include , hidden, query string.pdf', name:'File Include, Hidden Fields & Query String' },
                { type:'header', title:'Unit 3 — File Handling & OOP' },
                { file:'17 file handling.pdf', name:'File Handling Operations' }
            ],
            'evs': [
                { type:'header', title:'Unit 1' },
                { file:'EVS-Unit-1.pdf', name:'Unit 1 Notes' },
                { type:'header', title:'Unit 2' },
                { file:'UNIT-2 notes.pdf', name:'Unit 2 Notes' },
                { type:'header', title:'Unit 3' },
                { file:'EVS-Unit 3 for Internals.pdf', name:'Unit 3 Notes (Internals)' }
            ]
        }
    };

    let currentCategory = null;
    let currentSubject  = null;
    let currentFileName = null;

    const views = {
        category: document.getElementById('categoryDrawer'),
        subject:  document.getElementById('subjectDrawer'),
        list:     document.getElementById('listDrawer'),
        pdf:      document.getElementById('iframeContainer')
    };
    const categoryGrid     = document.getElementById('categoryGrid');
    const subjectGrid      = document.getElementById('subjectGrid');
    const listGrid         = document.getElementById('listGrid');
    const pdfFrame         = document.getElementById('pdfFrame');
    const subjectViewTitle = document.getElementById('subjectViewTitle');
    const listTitle        = document.getElementById('listTitle');
    const topSyllabusBtn   = document.getElementById('topSyllabusBtn');
    const iframeTitle      = document.getElementById('iframeTitle');
    const breadcrumb       = document.getElementById('breadcrumb');

    // JS Logic for Dynamic Sticky Calculation
    function updateStickyOffsets() {
        const header = document.querySelector('header');
        const bread = document.getElementById('breadcrumb');
        const toolbar = document.querySelector('.list-toolbar');

        if (!header || !bread) return;

        // Stick Breadcrumb directly under header
        const headerH = header.offsetHeight;
        bread.style.top = `${headerH}px`;

        // We only need to adjust toolbar and group headers if the list is visible
        if (views.list.classList.contains('active')) {
            const breadH = bread.offsetHeight;
            toolbar.style.top = `${headerH + breadH}px`;

            const toolH = toolbar.offsetHeight;
            const groupHeaders = document.querySelectorAll('.group-header');
            
            // Subtracted 1px to close any visual sub-pixel gaps between sticky boundaries
            groupHeaders.forEach(gh => {
                gh.style.top = `${headerH + breadH + toolH - 1}px`;
            });
        }
    }

    // Attach resize listener to keep heights accurate when device rotates or resizes
    window.addEventListener('resize', updateStickyOffsets);

    function showView(name) {
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[name].classList.add('active');
        updateBreadcrumb();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Let the DOM render the new height metrics before firing sticky offset calculation
        setTimeout(updateStickyOffsets, 50);
    }

    function updateBreadcrumb() {
        const crumbs = [{ label: 'Home', action: goHome }];
        if (currentCategory) crumbs.push({ label: categories[currentCategory].title, action: goBackToSubjects });
        if (currentSubject)  crumbs.push({ label: subjects[currentSubject].title,    action: goBackToList });
        if (currentFileName) crumbs.push({ label: currentFileName, action: null });

        breadcrumb.innerHTML = crumbs.map((c, i) => {
            const isLast = i === crumbs.length - 1;
            const cls    = isLast ? 'crumb active' : 'crumb';
            const span   = `<span class="${cls}">${c.label}</span>`;
            return i < crumbs.length - 1 ? span + `<span class="crumb-sep"> / </span>` : span;
        }).join('');

        breadcrumb.querySelectorAll('.crumb:not(.active)').forEach((el, i) => {
            el.addEventListener('click', crumbs[i].action);
        });
        
        setTimeout(updateStickyOffsets, 50);
    }

    function renderCategories() {
        categoryGrid.innerHTML = '';
        for (const key in categories) {
            const cat  = categories[key];
            const card = document.createElement('a');
            card.className = 'cat-card';
            card.href = '#';
            card.innerHTML = `
                <div class="cat-icon">${cat.icon}</div>
                <div>
                    <div class="cat-label">${cat.title}</div>
                    <div class="cat-meta" style="margin-top:0.35rem;">${cat.desc}</div>
                </div>
                <span class="cat-arrow">→</span>
            `;
            card.addEventListener('click', e => { e.preventDefault(); viewSubjects(key); });
            categoryGrid.appendChild(card);
        }
    }

    function viewSubjects(catKey) {
        currentCategory = catKey;
        currentSubject  = null;
        currentFileName = null;
        subjectViewTitle.textContent = categories[catKey].title;
        subjectGrid.innerHTML = '';

        for (const key in subjects) {
            const sub  = subjects[key];
            const card = document.createElement('a');
            card.className = 'sub-card';
            card.href = '#';
            card.innerHTML = `
                <div class="sub-icon">${sub.icon}</div>
                <div class="sub-label">${sub.title}</div>
            `;
            card.addEventListener('click', e => { e.preventDefault(); viewItemList(key); });
            subjectGrid.appendChild(card);
        }
        showView('subject');
    }

    function viewItemList(subjectKey) {
        currentSubject  = subjectKey;
        currentFileName = null;
        const files = contentData[currentCategory][subjectKey];
        const sub   = subjects[subjectKey];
        listTitle.textContent = sub.title;
        listGrid.innerHTML    = '';

        if (currentCategory === 'notes' && sub.syllabus) {
            topSyllabusBtn.style.display = 'inline-flex';
            topSyllabusBtn.onclick = () => openPDF(sub.syllabus, '📑 Syllabus');
        } else {
            topSyllabusBtn.style.display = 'none';
        }

        if (!files || files.length === 0) {
            listGrid.innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">🗂️</div>
                    <p>No materials uploaded yet</p>
                    <span>Check back later for ${sub.title} content.</span>
                </div>`;
        } else {
            let pyqCounter = 0;
            files.forEach(item => {
                if (typeof item === 'string') {
                    pyqCounter++;
                    listGrid.appendChild(makeFileRow(item, `PYQ Paper ${pyqCounter}`, '📄', pyqCounter));
                } else if (item.type === 'header') {
                    const hdr = document.createElement('div');
                    hdr.className   = 'group-header';
                    hdr.textContent = item.title;
                    listGrid.appendChild(hdr);
                } else {
                    listGrid.appendChild(makeFileRow(item.file, item.name, '📝', null));
                }
            });
        }
        showView('list');
    }

    function makeFileRow(file, name, icon, num) {
        const row = document.createElement('a');
        row.className = 'file-row';
        row.href = '#';
        const leftIcon = num
            ? `<div class="pyq-num">${num}</div>`
            : `<div class="file-row-icon">${icon}</div>`;
        row.innerHTML = `
            ${leftIcon}
            <span class="file-row-name">${name}</span>
            <span class="file-row-chip">PDF</span>
            <span class="file-row-arrow">→</span>
        `;
        row.addEventListener('click', e => { e.preventDefault(); openPDF(file, name); });
        return row;
    }

    function openPDF(fileName, displayName) {
        currentFileName = displayName || fileName;
        iframeTitle.textContent = currentFileName;
        pdfFrame.src = fileName + '?v=' + Date.now();
        showView('pdf');
    }

    function goHome() {
        currentCategory = null;
        currentSubject  = null;
        currentFileName = null;
        showView('category');
    }

    function goBackToSubjects() {
        currentSubject  = null;
        currentFileName = null;
        showView('subject');
    }

    function goBackToList() {
        currentFileName = null;
        pdfFrame.src = '';
        showView('list');
    }

    renderCategories();
    updateBreadcrumb();
</script>
</body>
</html>
